<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfit Advisor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at center, rgba(212,175,55,0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        .container {
            text-align: center;
            padding: 60px 40px;
            max-width: 640px;
            width: 100%;
            position: relative;
        }

        .crown {
            font-size: 2.5rem;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 12px rgba(212,175,55,0.8));
        }

        h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #f5e642 0%, #d4af37 40%, #fff8dc 60%, #d4af37 80%, #b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 20px rgba(212,175,55,0.4));
        }

        .subtitle {
            color: #888;
            letter-spacing: 3px;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 0 auto 50px;
        }

        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 36px;
            border: 1px solid rgba(212,175,55,0.4);
            background: transparent;
            color: #d4af37;
            border-radius: 2px;
            cursor: pointer;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.15), transparent);
            transition: left 0.4s ease;
        }

        button:hover::before { left: 100%; }

        button:hover, button.active {
            background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(212,175,55,0.05));
            border-color: #d4af37;
            color: #fff8dc;
            box-shadow: 0 0 20px rgba(212,175,55,0.25), inset 0 0 20px rgba(212,175,55,0.05);
        }

        .loading {
            color: #d4af37;
            letter-spacing: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
            display: none;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .error {
            color: #ff6b6b;
            display: none;
            margin-top: 20px;
            font-size: 0.85rem;
            letter-spacing: 2px;
        }

        .results {
            display: none;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .results h2 {
            font-size: 0.7rem;
            color: #d4af37;
            margin-bottom: 24px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .outfit-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .outfit-list li {
            padding: 18px 28px;
            border: 1px solid rgba(212,175,55,0.2);
            border-left: 3px solid #d4af37;
            border-radius: 2px;
            font-size: 1rem;
            background: linear-gradient(90deg, rgba(212,175,55,0.05), transparent);
            color: #fff8dc;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .outfit-list li:hover {
            border-color: rgba(212,175,55,0.6);
            background: linear-gradient(90deg, rgba(212,175,55,0.1), transparent);
            transform: translateX(4px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="crown">✦</div>
        <h1>Outfit Advisor</h1>
        <p class="subtitle">Curated style for every occasion</p>
        <div class="divider"></div>

        <div class="buttons">
            <button onclick="getOutfits('casual')">Casual</button>
            <button onclick="getOutfits('formal')">Formal</button>
            <button onclick="getOutfits('sport')">Sport</button>
        </div>

        <p class="loading" id="loading">Loading . . .</p>
        <p class="error" id="error">Something went wrong. Please try again.</p>

        <div class="results" id="results">
            <h2 id="category-title"></h2>
            <ul class="outfit-list" id="outfit-list"></ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
